    <div id="gmaps-trip-drawer">
      <div id="gmaps-trip-tab" onclick="toggleGoogleTripPanel()">Trips</div>
      <div id="gmaps-trip-panel">
        <h4>Export to Google Maps</h4>
        <div id="gmaps-trip-buttons"></div>
        <div class="gmaps-trip-note">
          Each export includes up to 10 route stops.
          Google Maps will route from your current location to the first stop in that trip.
        </div>
      </div>
    </div>

    <script>
      const googleTripExports = [{"trip_number": 1, "stop_count": 4, "destination": {"name": "Fairwinds & Turnberry Yard Sale - garage & moving sales - yard estate sale - craigslist", "address": "Jerusalem Rd, Hampden Township, PA 17050, USA", "lat": 40.2697186, "lon": -76.9912505, "route_stop_number": 1}, "waypoints": [{"name": "Sheepford Crossing Neighborhood", "address": "3 Merino Ln, Mechanicsburg, PA 17055, USA", "lat": 40.2021743, "lon": -76.936421, "route_stop_number": 2}, {"name": "Yard sale - garage & moving sales - yard estate sale - craigslist", "address": "Altavista Ave, Lower Paxton Township, PA 17109, USA", "lat": 40.2760675, "lon": -76.8358185, "route_stop_number": 3}, {"name": "Estate sale furniture and household items - garage & moving sales - yard estate sale - craigslist", "address": "Miller Rd, Colonial Park, PA 17109, USA", "lat": 40.2991946, "lon": -76.8146159, "route_stop_number": 4}]}];

      function toggleGoogleTripPanel() {
        const panel = document.getElementById('gmaps-trip-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
      }

      function stopToQuery(stop) {
        if (stop && stop.lat !== null && stop.lat !== undefined && stop.lon !== null && stop.lon !== undefined) {
          return stop.lat + ',' + stop.lon;
        }
        return (stop && (stop.address || stop.name)) || '';
      }

      function exportGoogleTrip(tripIndex) {
        const trip = googleTripExports[tripIndex];
        if (!trip || !trip.destination) {
          alert('No trip data available.');
          return;
        }

        const destination = encodeURIComponent(stopToQuery(trip.destination));
        const waypointList = (trip.waypoints || []).map(stopToQuery).filter(Boolean);

        let url = `https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=driving`;

        if (waypointList.length > 0) {
          url += `&waypoints=${encodeURIComponent(waypointList.join('|'))}`;
        }

        window.open(url, '_blank');
      }

      (function buildGoogleTripButtons() {
        const container = document.getElementById('gmaps-trip-buttons');
        if (!container) return;

        if (!googleTripExports.length) {
          container.innerHTML = '<div class="gmaps-trip-note">No route stops available.</div>';
          return;
        }

        googleTripExports.forEach((trip, idx) => {
          const firstStop = trip.destination?.route_stop_number ?? '?';
          const lastStop = trip.waypoints?.length
            ? trip.waypoints[trip.waypoints.length - 1].route_stop_number
            : firstStop;

          const btn = document.createElement('button');
          btn.className = 'gmaps-trip-btn';
          btn.textContent = `Trip ${trip.trip_number} (Stops ${firstStop}-${lastStop})`;
          btn.onclick = function() { exportGoogleTrip(idx); };
          container.appendChild(btn);
        });
      })();
    </script>
